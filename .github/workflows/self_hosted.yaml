name: readme_self_hosted

defaults:
  run:
    shell: bash

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 13 * * 4'

jobs:
  python:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .
      - run: pip install pytest-codeblocks pytest matplotlib
      - run: python -c "import pytest_codeblocks; code=pytest_codeblocks.extract_from_file('README.md'); f=open('readme.py', 'w'); f.writelines(block.code for block in code if block.syntax=='python'); f.close()"
      - run: cat -n readme.py
      - run: mv readme.py /mnt/cluster-workspace/healthcheck/readme.py
      - run: srun -n 2 --chdir=/mnt/cluster-workspace/healthcheck python -We readme.py
      - uses: actions/upload-artifact@v4
        with:
          path: readme_plot.*
          name: readme_plot
