name: readme_self_hosted

defaults:
  run:
    shell: bash

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 13 * * 4'

jobs:
  python:
    runs-on: self-hosted
    steps:
    - name: Create temp dir on network drive
      run: |
        TEMP_DIR="/mnt/network_drive/tmp_${{ github.run_id }}_${{ github.run_attempt }}"
        mkdir -p "$TEMP_DIR"
        echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

    - name: Checkout into temp dir
      uses: actions/checkout@v4
      with:
        path: ${{ env.TEMP_DIR }}

    - name: Verify
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        echo "Temp dir: $TEMP_DIR"
        ls -la "$TEMP_DIR"
    - name: Create Venv
      run: |
        python -m venv "$TEMP_DIR/venv"
    
    - name: Cleanup
      if: always()
      run: rm -rf "$TEMP_DIR"
