name: readme_self_hosted

defaults:
  run:
    shell: bash

env:
  PYENV_ROOT: /mnt/cluster-workspace/sfonxu/CI/.pyenv

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 13 * * 4'

jobs:
  python:
    runs-on: self-hosted
    steps:
    - name: Create temp dir on network drive
      run: |
        TEMP_DIR="/mnt/cluster-workspace/sfonxu/CI/tmp_${{ github.run_id }}_${{ github.run_attempt }}"
        mkdir -p "$TEMP_DIR"
        echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

    - name: Checkout
      uses: actions/checkout@v6

    - name: Verify
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        echo "Temp dir: $TEMP_DIR"
        ls -la "$TEMP_DIR"

    - name: Create Venv
      run: |
        set -ex
        export PATH=$PYENV_ROOT/bin:$PATH
        eval "$(pyenv init - bash)"
        pyenv local 3.13.13
        python3 -m venv "$TEMP_DIR/venv" --system-site-packages

    - name: Extract README code into readme.py and run it
      run: |
        echo "#!/bin/bash
        set -ex
        . $TEMP_DIR/venv/bin/activate
        pip install pytest-codeblocks pytest matplotlib
        pip install .
        python --version
        python -c "import pytest_codeblocks; code=pytest_codeblocks.extract_from_file('README.md'); f=open('readme.py', 'w'); f.writelines(block.code for block in code if block.syntax=='python'); f.close()"
        cat -n readme.py
        . $TEMP_DIR/venv/bin/activate; export PATH=/mnt/cluster-workspace/bin/openmpi-5.0.10/bin:$PATH; export LD_LIBRARY_PATH=/mnt/cluster-workspace/bin/openmpi-5.0.10/lib:/usr/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH; mpirun python readme.py" >> readme.sh
        sbatch -W -w major-tom,ground-control readme.sh

    - name: Cleanup
      if: always()
      run: rm -rf "$TEMP_DIR"
